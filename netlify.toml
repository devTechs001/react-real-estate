# Netlify Configuration for Real Estate Application
# https://docs.netlify.com/configure-builds/file-based-configuration/
# Last Updated: March 7, 2026

# =============================================================================
# BUILD CONFIGURATION
# =============================================================================

[build]
  # Build command - install only client deps (skip workspace to avoid server native deps like gl/tfjs-node)
  # Using --ignore-workspace and --prefer-offline to speed up builds and avoid server dependencies
  command = "cd client && pnpm install --ignore-workspace --prefer-offline && pnpm run build"
  # Directory containing the built application
  publish = "client/dist"

# Environment variables
[build.environment]
  NODE_VERSION = "18"
  PNPM_VERSION = "8.6.0"

# =============================================================================
# REDIRECTS & REWRITES
# =============================================================================

# SPA fallback redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy redirects (when using Netlify Functions)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# =============================================================================
# SECURITY HEADERS
# =============================================================================

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css"
    X-Content-Type-Options = "nosniff"

# =============================================================================
# DEVELOPMENT SETTINGS
# =============================================================================

[dev]
  command = "pnpm run dev"
  port = 5173
  autoLaunch = false
  framework = "#custom"

# =============================================================================
# CONTEXT-SPECIFIC SETTINGS
# =============================================================================

[context.production]
  # Only install client deps (skip workspace to avoid server native deps like gl/tfjs-node)
  command = "cd client && pnpm install --ignore-workspace --prefer-offline && pnpm run build"
  publish = "client/dist"

[context.production.environment]
  VITE_API_URL = "https://api.yourdomain.com"

[context.deploy-preview]
  # Only install client deps (skip workspace to avoid server native deps like gl/tfjs-node)
  command = "cd client && pnpm install --ignore-workspace --prefer-offline && pnpm run build"
  publish = "client/dist"

[context.deploy-preview.environment]
  VITE_API_URL = "https://staging-api.yourdomain.com"

[context.branch-deploy]
  # Only install client deps (skip workspace to avoid server native deps like gl/tfjs-node)
  command = "cd client && pnpm install --ignore-workspace --prefer-offline && pnpm run build"
  publish = "client/dist"

[context.branch-deploy.environment]
  VITE_API_URL = "https://dev-api.yourdomain.com"

# =============================================================================
# PLUGINS
# =============================================================================

[[plugins]]
  package = "@netlify/plugin-lighthouse"

[[plugins]]
  package = "@netlify/plugin-image-optim"

